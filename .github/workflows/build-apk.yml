name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK (Preview)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive

      - name: Fetch APK download URL
        run: |
          echo "Fetching the latest finished Android build..."
          BUILD_URL=$(eas build:list --platform android --status finished --limit 1 --json \
            | jq -r '.[0].artifacts.buildUrl')

          if [[ -z "$BUILD_URL" || "$BUILD_URL" == "null" ]]; then
            echo "❌ Failed to retrieve APK download URL"
            exit 1
          fi

          echo "✅ APK is ready!"
          echo "APK Download URL: $BUILD_URL"
          echo "APK_URL=$BUILD_URL" >> "$GITHUB_ENV"

      - name: Download APK
        run: curl -L "$APK_URL" -o Pilgrims-Daily-Grace.apk

      - name: Upload APK to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Pilgrims-Daily-Grace-APK
          path: Pilgrims-Daily-Grace.apk