name: Build OTA & APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ota:
    name: Publish OTA Update
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Publish OTA Update
        run: eas update --auto --platform android,ios
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Check Latest Update
        run: eas update:list --limit 1
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-ota

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android APK (Preview)
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Get APK Download URL
        run: |
          echo "Fetching the latest Android APK..."
          BUILD_URL=$(eas build:list --platform android --status finished --limit 1 --json | jq -r '.[0].artifacts.buildUrl')
          
          if [[ -z "$BUILD_URL" || "$BUILD_URL" == "null" ]]; then
            echo "❌ Failed to retrieve APK download URL"
            exit 1
          fi
          
          echo "✅ APK built successfully!"
          echo "APK_URL=$BUILD_URL" >> "$GITHUB_ENV"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download APK
        run: |
          curl -L "$APK_URL" -o Pilgrims-Daily-Grace.apk
          ls -lh Pilgrims-Daily-Grace.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pilgrims-Daily-Grace-APK
          path: Pilgrims-Daily-Grace.apk
          retention-days: 30

  build-ios-ipa:
    name: Build iOS IPA
    runs-on: ubuntu-latest
    needs: build-ota

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build iOS IPA (Preview)
        run: eas build --platform ios --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Get IPA Download URL
        run: |
          echo "Fetching the latest iOS IPA..."
          BUILD_URL=$(eas build:list --platform ios --status finished --limit 1 --json | jq -r '.[0].artifacts.buildUrl')
          
          if [[ -z "$BUILD_URL" || "$BUILD_URL" == "null" ]]; then
            echo "❌ Failed to retrieve IPA download URL"
            exit 1
          fi
          
          echo "✅ IPA built successfully!"
          echo "IPA_URL=$BUILD_URL" >> "$GITHUB_ENV"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download IPA
        run: |
          curl -L "$IPA_URL" -o Pilgrims-Daily-Grace.ipa
          ls -lh Pilgrims-Daily-Grace.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pilgrims-Daily-Grace-IPA
          path: Pilgrims-Daily-Grace.ipa
          retention-days: 30
