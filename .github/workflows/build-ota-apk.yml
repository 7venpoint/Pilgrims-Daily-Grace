# This is an example configuration for OTA APK builds using EAS

name: Build OTA APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install dependencies
        run: npm install

      - name: Build APK
        run: npm run build

      - name: Publish Update
        run: npx eas update --auto  # Updated line

      - name: Get Latest Release
        run: |  
          LATEST_RELEASE=$(npx eas update:list --non-interactive --json | jq -r '.[0].id')  # Updated line
          echo "Latest release ID: $LATEST_RELEASE"
